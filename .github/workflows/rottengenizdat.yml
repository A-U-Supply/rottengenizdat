name: rottengenizdat

on:
  workflow_dispatch:
    inputs:
      recipe:
        description: 'Recipe name (leave empty for random)'
        type: string
        default: ''
      sample_sale_count:
        description: 'Number of samples to pull from #sample-sale'
        type: string
        default: '3'
      input_mode:
        description: 'Input combination mode: splice, concat, independent'
        type: string
        default: 'splice'
      audio_urls:
        description: 'Comma-separated audio/video URLs (optional)'
        type: string
        default: ''

jobs:
  rottengenizdat:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Cache RAVE models
        uses: actions/cache@v4
        with:
          path: ~/.cache/rottengenizdat/models
          key: rave-models-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[torch]"
          pip install yt-dlp

      - name: Pick recipe
        id: recipe
        run: |
          RECIPE="${{ inputs.recipe }}"
          if [ -z "$RECIPE" ]; then
            RECIPE=$(ls recipes/*.toml | shuf -n1 | xargs -I{} basename {} .toml)
            echo "Randomly selected: $RECIPE"
          fi
          echo "name=$RECIPE" >> "$GITHUB_OUTPUT"

      - name: Configure Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          rotten config set slack.token "$SLACK_BOT_TOKEN"
          rotten config set slack.channel C07QNGDTBR6

      - name: Run rottengenizdat
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          CMD="rotten recipe run recipes/${{ steps.recipe.outputs.name }}.toml"
          CMD="$CMD --sample-sale-count ${{ inputs.sample_sale_count }}"
          if [ "${{ inputs.input_mode }}" != "splice" ]; then
            CMD="$CMD --mode ${{ inputs.input_mode }}"
          fi
          CMD="$CMD -o output.wav"
          echo "Running: $CMD"
          $CMD

      - name: Post result to Slack
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          RECIPE="${{ steps.recipe.outputs.name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SOURCES_FLAG=""
          if [ -f sources.json ]; then
            SOURCES_FLAG="--sources sources.json"
          fi
          rotten slack-post output.wav \
            --label "$RECIPE" \
            --channel C0ARZFZ5KLJ \
            --source-channel C07QNGDTBR6 \
            --run-url "$RUN_URL" \
            $SOURCES_FLAG

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          RECIPE="${{ steps.recipe.outputs.name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"C0ARZFZ5KLJ\", \"text\": \":x: rottengenizdat run failed (recipe: ${RECIPE}). <${RUN_URL}|View logs>\"}"
