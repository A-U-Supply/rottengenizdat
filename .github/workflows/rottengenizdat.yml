name: rottengenizdat

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode: recipe (default) or chain (custom)'
        type: string
        default: 'recipe'
      recipe:
        description: 'Recipe name (leave empty for random, recipe mode only)'
        type: string
        default: ''
      chain_steps:
        description: 'JSON array of step strings (chain mode only)'
        type: string
        default: '[]'
      chain_mode:
        description: 'Chain mode: sequential or branch (chain mode only)'
        type: string
        default: 'sequential'
      sample_sale_count:
        description: 'Number of samples to pull from #sample-sale'
        type: string
        default: '3'
      input_mode:
        description: 'Input combination mode: splice, concat, blend, independent'
        type: string
        default: 'splice'
      audio_urls:
        description: 'Comma-separated audio/video URLs (optional)'
        type: string
        default: ''

jobs:
  rottengenizdat:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Cache RAVE models
        uses: actions/cache@v4
        with:
          path: ~/.cache/rottengenizdat/models
          key: rave-models-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[torch]"
          pip install yt-dlp

      - name: Pick recipe
        id: recipe
        if: inputs.run_mode != 'chain'
        run: |
          RECIPE="${{ inputs.recipe }}"
          if [ -z "$RECIPE" ]; then
            RECIPE=$(ls recipes/*.toml | shuf -n1 | xargs -I{} basename {} .toml)
            echo "Randomly selected: $RECIPE"
          fi
          echo "name=$RECIPE" >> "$GITHUB_OUTPUT"

      - name: Configure Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          rotten config set slack.token "$SLACK_BOT_TOKEN"
          rotten config set slack.channel C07QNGDTBR6

      - name: Build run label
        id: label
        run: |
          if [ "${{ inputs.run_mode }}" = "chain" ]; then
            echo "name=custom-chain" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ steps.recipe.outputs.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run rottengenizdat (recipe)
        if: inputs.run_mode != 'chain'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          CMD="rotten recipe run recipes/${{ steps.recipe.outputs.name }}.toml"
          CMD="$CMD --sample-sale-count ${{ inputs.sample_sale_count }}"
          if [ "${{ inputs.input_mode }}" != "splice" ]; then
            CMD="$CMD --mode ${{ inputs.input_mode }}"
          fi
          CMD="$CMD -o output.wav"
          echo "Running: $CMD"
          $CMD

      - name: Run rottengenizdat (chain)
        if: inputs.run_mode == 'chain'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          # Parse step strings from JSON array
          STEPS=$(echo '${{ inputs.chain_steps }}' | python3 -c "
          import sys, json
          steps = json.load(sys.stdin)
          for s in steps:
              print(s)
          ")

          CMD="rotten chain"
          CMD="$CMD --sample-sale-count ${{ inputs.sample_sale_count }}"
          if [ "${{ inputs.chain_mode }}" = "branch" ]; then
            CMD="$CMD --branch"
          fi
          if [ "${{ inputs.input_mode }}" != "splice" ]; then
            CMD="$CMD --mode ${{ inputs.input_mode }}"
          fi
          CMD="$CMD -o output.wav"

          # Append each step as a quoted argument
          while IFS= read -r step; do
            CMD="$CMD \"$step\""
          done <<< "$STEPS"

          echo "Running: $CMD"
          eval $CMD

      - name: Post result to Slack
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          LABEL="${{ steps.label.outputs.name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SOURCES_FLAG=""
          if [ -f sources.json ]; then
            SOURCES_FLAG="--sources sources.json"
          fi
          rotten slack-post output.wav \
            --label "$LABEL" \
            --channel C0ARZFZ5KLJ \
            --source-channel C07QNGDTBR6 \
            --run-url "$RUN_URL" \
            $SOURCES_FLAG

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          LABEL="${{ steps.label.outputs.name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"C0ARZFZ5KLJ\", \"text\": \":x: rottengenizdat run failed (${LABEL}). <${RUN_URL}|View logs>\"}"
