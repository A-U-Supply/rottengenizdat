name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-pex:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: macos-14
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pex
        run: pip install pex

      - name: Build PEX
        run: |
          pex . \
            --python-shebang='/usr/bin/env python3' \
            --console-script rotten \
            --exclude torch \
            --exclude torchaudio \
            --exclude torio \
            -o rotten-${{ matrix.suffix }}.pex

      - name: Verify PEX runs (help text only — no torch needed)
        run: |
          # --help doesn't import torch, so this validates the PEX structure
          python3 rotten-${{ matrix.suffix }}.pex --help

      - uses: actions/upload-artifact@v4
        with:
          name: pex-${{ matrix.suffix }}
          path: rotten-${{ matrix.suffix }}.pex

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  release:
    needs: [build-pex, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --title "rottengenizdat $tag" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-creatordate | head -2 | tail -1 || echo '')" \
            artifacts/pex-linux-x86_64/rotten-linux-x86_64.pex \
            artifacts/pex-macos-arm64/rotten-macos-arm64.pex
