[recipe]
name = "shortwave"
mode = "branch"

# numbers station vibes — tuning through radio bands at 3am
# quantized NASA gives the static and transmission artifacts
# faint VCTK adds ghostly speech fragments underneath

[[steps]]
effect = "rave"
model = "nasa"
temperature = 1.3
noise = 0.15
quantize = 0.3
weight = 0.5

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 0.6
dims = "0,1"
quantize = 0.4
weight = 0.3

[[steps]]
effect = "dry"
weight = 0.2
