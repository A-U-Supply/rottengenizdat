[recipe]
name = "sludge"
mode = "sequential"

# thick, heavy, ground down — everything becomes a slow grinding mass
# percussion gives it weight, strings add overtones, vintage smooths the edges
# quantize and high temp make it crunch

[[steps]]
effect = "rave"
model = "percussion"
temperature = 1.6
quantize = 0.6

[[steps]]
effect = "rave"
model = "sol_full"
temperature = 1.4
quantize = 0.3

[[steps]]
effect = "rave"
model = "vintage"
temperature = 1.2
noise = 0.3
