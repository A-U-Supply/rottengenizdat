[recipe]
name = "congregation"
mode = "branch"

# maximum vocal density — seven voices from four voice-like models
# each voice emphasizes different latent dimensions so they don't collapse into mush
# a wall of neural singers, each hearing the song through different ears

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 1.2
noise = 0.15
dims = "0,1,2,3"

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 0.8
noise = 0.3
dims = "4,5,6,7"

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 1.5
noise = 0.2
dims = "8,9,10,11"

[[steps]]
effect = "rave"
model = "isis"
temperature = 1.0
noise = 0.1
dims = "0,1,2,3,4,5,6,7"

[[steps]]
effect = "rave"
model = "isis"
temperature = 1.3
noise = 0.2
dims = "8,9,10,11,12,13,14,15"

[[steps]]
effect = "rave"
model = "sol_ordinario"
temperature = 0.9
dims = "0,2,4,6,8,10"

[[steps]]
effect = "rave"
model = "sol_full"
temperature = 1.1
dims = "1,3,5,7,9,11"
