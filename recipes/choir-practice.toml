[recipe]
name = "choir-practice"
mode = "branch"

# drunk-choir's bigger sibling — five VCTK voices at staggered temperatures
# like a room full of neural networks all trying to sing your track at once
# dense, warm, and unmistakably choral

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 0.7
noise = 0.1

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 1.0
noise = 0.15

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 1.3
noise = 0.2

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 1.6
noise = 0.25
dims = "4,5,6,7,8,9,10,11"

[[steps]]
effect = "rave"
model = "isis"
temperature = 0.9
noise = 0.15
dims = "0,1,2,3,4,5"
