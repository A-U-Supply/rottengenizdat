[recipe]
name = "choir-of-ghosts"
mode = "sequential"

# pass through one voice model first, then branch the result through four more
# voices built on voices — dense, smeared, layered deep
# like hearing a choir through the memory of another choir

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 1.0
noise = 0.1

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 1.3
noise = 0.2
dims = "0,1,2,3,4,5,6,7"

[[steps]]
effect = "rave"
model = "isis"
temperature = 0.9
noise = 0.15

[[steps]]
effect = "rave"
model = "sol_ordinario"
temperature = 1.1
dims = "4,5,6,7,8,9,10,11"

[[steps]]
effect = "rave"
model = "VCTK"
temperature = 1.5
noise = 0.3
dims = "8,9,10,11,12,13,14,15"
