[recipe]
name = "concrete-music"
mode = "branch"

# musique concrete — four models reinterpret your input
# as found-object textures with shuffle and reverse
# percussion as tape splices, nasa as field recordings,
# isis as resonant bodies, darbouka as hand-struck surfaces

[[steps]]
effect = "rave"
model = "percussion"
temperature = 1.3
shuffle_chunks = 4
weight = 0.3

[[steps]]
effect = "rave"
model = "darbouka_onnx"
temperature = 1.1
weight = 0.25

[[steps]]
effect = "rave"
model = "nasa"
temperature = 1.0
noise = 0.1
weight = 0.25

[[steps]]
effect = "rave"
model = "isis"
temperature = 0.9
reverse = true
weight = 0.2
