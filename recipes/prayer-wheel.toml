[recipe]
name = "prayer-wheel"
mode = "branch"

# four models at nearly identical low settings on structural dims
# meditative, droning, mantra-like — differences between models
# create a shimmering interference pattern

[[steps]]
effect = "rave"
model = "sol_ordinario"
temperature = 0.6
dims = "0,1,2,3"
weight = 0.25

[[steps]]
effect = "rave"
model = "sol_full"
temperature = 0.65
dims = "0,1,2,3"
weight = 0.25

[[steps]]
effect = "rave"
model = "isis"
temperature = 0.6
dims = "0,1,2,3"
weight = 0.25

[[steps]]
effect = "rave"
model = "musicnet"
temperature = 0.55
dims = "0,1,2,3"
weight = 0.25
